---
version: "2.0"

services:
  web:
    image: nginx:alpine
    expose:
      - port: 80
        as: 80
        to:
          - global: true

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 128Mi
        storage:
          size: 512Mi

  placement:
    default:
      attributes:
        host: akash
      pricing:
        web:
          denom: uakt
          amount: 100

deployment:
  web:
    default:
      profile: web
      count: 1
