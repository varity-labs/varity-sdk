---
version: "2.0"

services:
  mcp:
    image: ghcr.io/varity-labs/varity-mcp:v1.3.0
    expose:
      - port: 3100
        as: 80
        to:
          - global: true
        accept:
          - mcp.varity.so
        http_options:
          max_body_size: 10485760
    env:
      - NODE_ENV=production
      - VARITY_AUTH_URL=https://auth.varity.so
      - VARITY_GATEWAY_URL=https://varity.app
      - GITHUB_TOKEN=
      - VARITY_MCP_DEV_TOKEN=varity_beta_2026_f8a9c2e4d6b7a1c3e5f8a9c2e4d6b7a1c3e5f8a9

profiles:
  compute:
    mcp:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi

  placement:
    akash:
      pricing:
        mcp:
          denom: uakt
          amount: 1000

deployment:
  mcp:
    akash:
      profile: mcp
      count: 1
