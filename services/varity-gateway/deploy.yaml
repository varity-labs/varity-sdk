# WARNING: Never hardcode secrets. Use ${VAR_NAME} substitution.
# Values injected at deploy time via Akash Console. See .env.example for required vars.
---
version: "2.0"
endpoints:
  gateway-ip:
    kind: ip
services:
  gateway:
    image: ghcr.io/varity-labs/varity-gateway:1.9.12
    expose:
      - port: 8081
        as: 80
        to:
          - global: true
            ip: gateway-ip
      - port: 8443
        as: 443
        to:
          - global: true
            ip: gateway-ip
    env:
      - NODE_ENV=production
      - PORT=8080
      - DB_PROXY_URL=${DB_PROXY_URL}
      - DB_PROXY_TOKEN=${DB_PROXY_TOKEN}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - BASE_DOMAIN=varity.app
      - IPFS_BACKEND=ipfs.dweb.link
      - CACHE_TTL=300
      - PRIVY_APP_ID=${PRIVY_APP_ID}
      - PRIVY_APP_SECRET=${PRIVY_APP_SECRET}
      - VARITY_AKASH_CONSOLE_KEY=${VARITY_AKASH_CONSOLE_KEY}
      - SUBGRAPH_PAYMENTS_URL=${SUBGRAPH_PAYMENTS_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
profiles:
  compute:
    gateway:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    akash:
      pricing:
        gateway:
          denom: uakt
          amount: 1000
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
        allOf: []
deployment:
  gateway:
    akash:
      profile: gateway
      count: 1
