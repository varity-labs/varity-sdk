---
version: "2.0"
services:
  credential-proxy:
    image: ghcr.io/varity-labs/credential-proxy:1.1.2
    expose:
      - port: 8001
        as: 80
        to:
          - global: true
    env:
      - "ENV=production"
      - "VARITY_THIRDWEB_SECRET_KEY=${VARITY_THIRDWEB_SECRET_KEY}"
      - "VARITY_THIRDWEB_CLIENT_ID=${VARITY_THIRDWEB_CLIENT_ID}"
      - "VARITY_PRIVY_APP_ID=${VARITY_PRIVY_APP_ID}"
      - "VARITY_CLI_PRODUCTION_KEY=${VARITY_CLI_PRODUCTION_KEY}"
      - "VARITY_CLI_BETA_KEY=${VARITY_CLI_BETA_KEY}"
      - "VARITY_CLI_DEV_KEY=${VARITY_CLI_DEV_KEY}"
      - "VARITY_GATEWAY_API_KEY=${VARITY_GATEWAY_API_KEY}"
      - "VARITY_DB_JWT_SECRET=${VARITY_DB_JWT_SECRET}"
      - "VARITY_AKASH_CONSOLE_KEY=${VARITY_AKASH_CONSOLE_KEY}"
      - "HOST=0.0.0.0"
      - "PORT=8001"
profiles:
  compute:
    credential-proxy:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    akash:
      pricing:
        credential-proxy:
          denom: ibc/170C677610AC31DF0904FFE09CD3B5C657492170E7E52372E48756B71E56F2F1
          amount: 1000
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
        allOf: []
deployment:
  credential-proxy:
    akash:
      profile: credential-proxy
      count: 1
