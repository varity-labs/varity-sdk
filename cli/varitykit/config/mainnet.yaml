# Varity Mainnet Configuration
# ⚠️  PRODUCTION CONFIGURATION - USE WITH CAUTION ⚠️

# Blockchain Networks
networks:
  # Arbitrum One Mainnet (Primary L3 Settlement Layer)
  arbitrum:
    name: Arbitrum One
    chainId: 42161
    rpc: https://arb1.arbitrum.io/rpc
    # Alternative RPC with Alchemy (requires ALCHEMY_API_KEY env var)
    # rpc: https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}
    explorer: https://arbiscan.io
    nativeCurrency:
      name: Ethereum
      symbol: ETH
      decimals: 18

# DePin Infrastructure Configurations
depin:
  # Akash Network (Decentralized Compute)
  akash:
    name: Akash Mainnet
    rpc: https://rpc.akash.forbole.com:443
    api: https://api.akash.forbole.com:443
    chainId: akashnet-2
    explorer: https://akash.network
    nativeCurrency:
      name: AKT
      symbol: AKT
      decimals: 6
    # Production deployment settings
    defaults:
      minCPU: 500  # millicores
      minMemory: 2048  # MB
      minStorage: 10  # GB
      maxCPU: 32000
      maxMemory: 65536
      maxStorage: 2048
      timeout: 600  # seconds

  # Filecoin/IPFS Storage (via Pinata)
  filecoin:
    name: Filecoin Mainnet
    pinata:
      api: https://api.pinata.cloud
      gateway: https://gateway.pinata.cloud
      uploadEndpoint: /pinning/pinFileToIPFS
      uploadJSONEndpoint: /pinning/pinJSONToIPFS
      unpinEndpoint: /pinning/unpin
      pinListEndpoint: /data/pinList
      # Environment variables required:
      # - PINATA_API_KEY
      # - PINATA_API_SECRET

  # Celestia DA (Data Availability Layer)
  celestia:
    name: Celestia Mainnet
    network: celestia
    rpc: https://rpc.celestia.pops.one
    api: https://api.celestia.pops.one
    explorer: https://celenium.io
    # Namespace configuration for PDA (Proxy Data Availability)
    namespaces:
      varity_internal: "0x76617269747900000000000000000000000000000001"
      industry_rag: "0x76617269747900000000000000000000000000000002"
      customer_data: "0x76617269747900000000000000000000000000000003"
    # Environment variable required:
    # - CELESTIA_AUTH_TOKEN

  # Lit Protocol (Encryption & Access Control)
  lit:
    name: Lit Protocol Mainnet
    network: habanero
    nodes:
      - https://habanero-1.getlit.dev
      - https://habanero-2.getlit.dev
      - https://habanero-3.getlit.dev
    chainId: 1  # Ethereum mainnet
    litTokenAddress: "0x0000000000000000000000000000000000000000"

# Deployed Contract Addresses (Mainnet)
# ⚠️  MUST BE SET BEFORE PRODUCTION USE ⚠️
contracts:
  dashboardRegistry: ""
  templateManager: ""
  accessControl: ""
  billingModule: ""
  zkmlVerifier: ""
  oracleClient: ""

# Gas Configuration
gas:
  # Gas limits for different operations
  limits:
    deployContract: 8000000
    registerDashboard: 500000
    grantAccess: 150000
    recordUsage: 120000
  # Gas price settings (in gwei) - will use network estimates
  price:
    standard: 0.1
    fast: 0.15
    rapid: 0.25

# Storage Layer Configuration
storage:
  # Layer 1: Varity Internal Storage
  varity_internal:
    layer: varity-internal
    namespace_prefix: varity-internal
    encryption_enabled: true
    lit_protocol_access: varity-admins-only
    celestia_da_enabled: true
    max_file_size_mb: 100
    allowed_extensions:
      - .pdf
      - .docx
      - .txt
      - .md
      - .json
      - .yaml

  # Layer 2: Industry RAG Storage
  industry_rag:
    layer: industry-rag
    namespace_prefix: industry-{industry}-rag
    encryption_enabled: true
    lit_protocol_access: industry-customers
    celestia_da_enabled: true
    target_documents: 10000
    max_file_size_mb: 50
    allowed_extensions:
      - .pdf
      - .docx
      - .txt
      - .md
      - .json

  # Layer 3: Customer Data Storage
  customer_data:
    layer: customer-data
    namespace_prefix: customer-{company-id}
    encryption_enabled: true
    lit_protocol_access: customer-only
    celestia_da_enabled: true
    zk_proofs_enabled: true
    max_file_size_mb: 1000
    allowed_extensions:
      - "*"  # All file types allowed

# Template Configuration
templates:
  industries:
    - finance
    - healthcare
    - retail
    - iso-merchant
  template_cid_prefix: "Qm"
  version_format: "v{major}.{minor}.{patch}"

# Deployment Configuration
deployment:
  # Increased timeouts for production
  timeout: 1200
  retries:
    max_attempts: 5
    backoff_multiplier: 2
    initial_delay: 10
  health_check:
    enabled: true
    interval: 60
    timeout: 30
    retries: 5
  verification:
    enabled: true
    wait_confirmations: 5
    timeout: 600

# Monitoring & Logging
monitoring:
  log_level: INFO
  verbose: false
  metrics_enabled: true
  sentry_dsn: "${SENTRY_DSN}"  # Set via environment variable

# Cost Estimation (Mainnet - real costs)
cost_estimates:
  # Arbitrum One (real ETH costs)
  gas_price_gwei: 0.1
  eth_usd_price: 2000  # Approximate, update regularly
  # Akash Network (real AKT costs)
  akt_usd_price: 0.50  # Approximate, update regularly
  # Filecoin via Pinata (paid tiers)
  pinata_monthly_cost: 20  # USD for 100GB plan

# Security Configuration (Production)
security:
  # Require hardware wallet for mainnet deployments
  require_hardware_wallet: true
  # Enable multisig for admin operations
  enable_multisig: true
  multisig_threshold: 2
  # Stricter rate limiting
  rate_limit:
    enabled: true
    max_requests_per_minute: 30
