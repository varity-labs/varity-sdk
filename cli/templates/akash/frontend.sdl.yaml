---
# Akash SDL Manifest for Frontend Deployment
# Generated by Varity SDK - Frontend Static Site
version: "2.0"

services:
  web:
    image: {{ docker_image }}
    expose:
      - port: 80
        as: 80
        to:
          - global: true
{% if env_vars %}
    env:
{% for key, value in env_vars.items() %}
      - {{ key }}={{ value }}
{% endfor %}
{% endif %}

profiles:
  compute:
    web:
      resources:
        cpu:
          units: {{ cpu_units }}
        memory:
          size: {{ memory_size }}
        storage:
          size: {{ storage_size }}

  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
      pricing:
        web:
          denom: uakt
          amount: 1000

deployment:
  web:
    akash:
      profile: web
      count: 1
