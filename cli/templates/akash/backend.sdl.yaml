---
# Akash SDL Manifest for Backend Deployment
# Generated by Varity SDK - Backend Service
version: "2.0"

services:
  api:
    image: {{ docker_image }}
    expose:
      - port: {{ port }}
        as: {{ port }}
        to:
          - global: true
{% if env_vars %}
    env:
{% for key, value in env_vars.items() %}
      - {{ key }}={{ value }}
{% endfor %}
{% endif %}
{% if command %}
    command:
{% for cmd in command %}
      - {{ cmd }}
{% endfor %}
{% endif %}

profiles:
  compute:
    api:
      resources:
        cpu:
          units: {{ cpu_units }}
        memory:
          size: {{ memory_size }}
        storage:
          size: {{ storage_size }}

  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
      pricing:
        api:
          denom: uakt
          amount: 2000

deployment:
  api:
    akash:
      profile: api
      count: 1
