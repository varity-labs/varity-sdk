# Dependabot configuration for varity-sdk monorepo
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ─── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: root (pnpm workspace) ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-root-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: @varity-labs/sdk ────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/core/varity-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "sdk"
    groups:
      sdk-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: @varity-labs/types ──────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/core/varity-types"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "types"
    groups:
      types-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: @varity-labs/ui-kit ─────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/ui/varity-ui-kit"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "ui-kit"
    groups:
      ui-kit-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: @varity-labs/mcp ────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/cli/varity-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "mcp"
    groups:
      mcp-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: create-varity-app ───────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/cli/create-varity-app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "create-varity-app"
    groups:
      create-app-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: SaaS starter template ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/templates/saas-starter"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "template"
    groups:
      template-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: varity-gateway service ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/services/varity-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "service"
    groups:
      gateway-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── npm: varity-db-proxy service ─────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/services/varity-db-proxy"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "service"
    groups:
      db-proxy-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── pip: varitykit CLI ───────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      - "cli"
    groups:
      cli-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── pip: credential-proxy service ────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/services/varity-credential-proxy"
    schedule:
      interval: "weekly"
