<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="dotRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="dotYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="dotGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glowRed"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowYellow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowGreen"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <style>
    @keyframes fadeIn1  { 0%, 5%  { opacity: 0 } 6%  { opacity: 1 } }
    @keyframes fadeIn2  { 0%, 12% { opacity: 0 } 13% { opacity: 1 } }
    @keyframes fadeIn3  { 0%, 19% { opacity: 0 } 20% { opacity: 1 } }
    @keyframes fadeIn4  { 0%, 25% { opacity: 0 } 26% { opacity: 1 } }
    @keyframes fadeIn5  { 0%, 31% { opacity: 0 } 32% { opacity: 1 } }
    @keyframes fadeIn6  { 0%, 38% { opacity: 0 } 39% { opacity: 1 } }
    @keyframes fadeIn7  { 0%, 47% { opacity: 0 } 48% { opacity: 1 } }
    @keyframes fadeIn8  { 0%, 57% { opacity: 0 } 58% { opacity: 1 } }
    @keyframes fadeIn9  { 0%, 63% { opacity: 0 } 64% { opacity: 1 } }

    @keyframes progressBar {
      0%, 47% { width: 0 }
      48% { width: 0 }
      57% { width: 280px }
    }

    @keyframes blink {
      0%, 49% { opacity: 1 }
      50%, 100% { opacity: 0 }
    }

    @keyframes cursor {
      0%, 5% { opacity: 1 }
      6% { opacity: 0 }
    }

    text.line {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 14.5px;
      letter-spacing: 0.02em;
    }

    .title-text {
      fill: #94a3b8;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .cmd     { fill: #14b8a6; }
    .info    { fill: #cbd5e1; }
    .success { fill: #34d399; }
    .progress-text { fill: #67e8f9; }
    .final   { fill: #ffffff; font-weight: 600; }
    .savings { fill: #34d399; }

    .line1 { animation: fadeIn1 16s infinite; opacity: 0; }
    .line2 { animation: fadeIn2 16s infinite; opacity: 0; }
    .line3 { animation: fadeIn3 16s infinite; opacity: 0; }
    .line4 { animation: fadeIn4 16s infinite; opacity: 0; }
    .line5 { animation: fadeIn5 16s infinite; opacity: 0; }
    .line6 { animation: fadeIn6 16s infinite; opacity: 0; }
    .line7 { animation: fadeIn7 16s infinite; opacity: 0; }
    .line8 { animation: fadeIn8 16s infinite; opacity: 0; }
    .line9 { animation: fadeIn9 16s infinite; opacity: 0; }

    .cursor-blink { animation: blink 0.8s step-end infinite, cursor 16s infinite; }
    .progress-fill { animation: progressBar 16s infinite; }
  </style>

  <!-- Window frame with gradient background -->
  <rect fill="url(#bgGrad)" x="0" y="0" width="800" height="440" rx="16" ry="16"/>

  <!-- Border -->
  <rect fill="none" stroke="#1e293b" stroke-opacity="0.8" x="0.5" y="0.5" width="799" height="439" rx="16" ry="16"/>

  <!-- Title bar -->
  <rect fill="url(#headerGrad)" x="1" y="1" width="798" height="44" rx="16" ry="16"/>
  <rect fill="url(#headerGrad)" x="1" y="32" width="798" height="13"/>
  <!-- Title bar bottom border -->
  <line x1="1" y1="45" x2="799" y2="45" stroke="#1e293b" stroke-opacity="0.6"/>

  <!-- macOS dots with glow -->
  <circle fill="url(#dotRed)" cx="28" cy="23" r="6" filter="url(#glowRed)"/>
  <circle fill="url(#dotYellow)" cx="50" cy="23" r="6" filter="url(#glowYellow)"/>
  <circle fill="url(#dotGreen)" cx="72" cy="23" r="6" filter="url(#glowGreen)"/>

  <!-- Title -->
  <text class="title-text" x="400" y="28" text-anchor="middle">terminal</text>

  <!-- Blinking cursor -->
  <rect class="cursor-blink" x="40" y="68" width="10" height="18" fill="#14b8a6" rx="2" opacity="0.9"/>

  <!-- Line 1: $ varitykit deploy -->
  <text class="line line1 cmd" x="40" y="84">$ varitykit deploy</text>

  <!-- Line 2: Analyzing your app... -->
  <text class="line line2 info" x="40" y="124">Analyzing your app...</text>

  <!-- Line 3: ✓ Detected: Next.js application -->
  <text class="line line3 success" x="40" y="158">  ✓ Detected: Next.js application</text>

  <!-- Line 4: ✓ Setting up: Auth, payments, storage -->
  <text class="line line4 success" x="40" y="188">  ✓ Setting up: Auth, payments, storage</text>

  <!-- Line 5: ✓ Optimizing for production -->
  <text class="line line5 success" x="40" y="218">  ✓ Optimizing for production</text>

  <!-- Line 6: Deploying to Varity... -->
  <text class="line line6 info" x="40" y="258">Deploying to Varity...</text>

  <!-- Line 7: Progress bar -->
  <g class="line7">
    <!-- Progress bar background -->
    <rect x="60" y="275" width="280" height="14" rx="4" fill="#1e293b" opacity="0.8"/>
    <!-- Progress bar fill -->
    <rect class="progress-fill" x="60" y="275" width="0" height="14" rx="4" fill="#14b8a6" opacity="0.7"/>
    <text class="line progress-text" x="352" y="287"> 100%</text>
  </g>

  <!-- Line 8: ✅ Live at: https://my-app.varity.app -->
  <text class="line line8 final" x="40" y="330">✅ Live at: https://my-app.varity.app</text>

  <!-- Line 9: Cost savings -->
  <text class="line line9 savings" x="40" y="364">   Saving 60-80% vs AWS — auth, database, hosting included</text>

  <!-- Subtle bottom gradient fade -->
  <rect fill="url(#bgGrad)" x="1" y="410" width="798" height="29" rx="0" ry="0" opacity="0.5"/>
  <rect fill="none" x="0" y="424" width="800" height="16" rx="16" ry="16"/>
</svg>
