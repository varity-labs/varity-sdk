<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30,41,59,0.5)"/>
      <stop offset="100%" stop-color="rgba(15,23,42,0.3)"/>
    </linearGradient>
    <linearGradient id="dotRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="dotYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="dotGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glowRed"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowYellow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowGreen"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes line1 { 0%, 7%  { opacity: 0; transform: translateY(4px) } 10%  { opacity: 1; transform: translateY(0) } }
    @keyframes line2 { 0%, 17% { opacity: 0; transform: translateY(4px) } 20%  { opacity: 1; transform: translateY(0) } }
    @keyframes line3 { 0%, 27% { opacity: 0; transform: translateY(4px) } 30%  { opacity: 1; transform: translateY(0) } }
    @keyframes line4 { 0%, 37% { opacity: 0; transform: translateY(4px) } 40%  { opacity: 1; transform: translateY(0) } }
    @keyframes line5 { 0%, 47% { opacity: 0; transform: translateY(4px) } 50%  { opacity: 1; transform: translateY(0) } }
    @keyframes line6 { 0%, 57% { opacity: 0; transform: translateY(4px) } 60%  { opacity: 1; transform: translateY(0) } }
    @keyframes line7 { 0%, 67% { opacity: 0; transform: translateY(4px) } 70%  { opacity: 1; transform: translateY(0) } }
    @keyframes cursor { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }

    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 15px; }
    .title { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 12px; letter-spacing: 0.05em; }

    .l1 { animation: line1 12s ease-out both; }
    .l2 { animation: line2 12s ease-out both; }
    .l3 { animation: line3 12s ease-out both; }
    .l4 { animation: line4 12s ease-out both; }
    .l5 { animation: line5 12s ease-out both; }
    .l6 { animation: line6 12s ease-out both; }
    .l7 { animation: line7 12s ease-out both; }
    .blink { animation: cursor 1s step-end infinite; }
  </style>

  <!-- Window background -->
  <rect width="800" height="420" rx="16" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="800" height="420" rx="16" fill="none" stroke="#1e293b" stroke-opacity="0.8" stroke-width="1"/>

  <!-- Title bar background -->
  <rect width="800" height="44" rx="16" fill="url(#titlebar)"/>
  <rect y="32" width="800" height="12" fill="url(#titlebar)"/>

  <!-- Title bar bottom border -->
  <line x1="0" y1="44" x2="800" y2="44" stroke="#1e293b" stroke-opacity="0.6" stroke-width="1"/>

  <!-- Window dots with glow -->
  <circle cx="24" cy="22" r="6" fill="url(#dotRed)" filter="url(#glowRed)" opacity="0.9"/>
  <circle cx="46" cy="22" r="6" fill="url(#dotYellow)" filter="url(#glowYellow)" opacity="0.9"/>
  <circle cx="68" cy="22" r="6" fill="url(#dotGreen)" filter="url(#glowGreen)" opacity="0.9"/>

  <!-- Title text -->
  <text x="400" y="26" text-anchor="middle" fill="#64748b" class="title">zsh</text>

  <!-- Terminal content area: starts at y=44, padding 24px -->

  <!-- Line 1: $ varitykit deploy -->
  <g class="l1">
    <text x="32" y="90" class="mono" fill="#2dd4bf">$</text>
    <text x="50" y="90" class="mono" fill="#f8fafc" font-weight="500">varitykit deploy</text>
  </g>

  <!-- Line 2: Analyzing your app... -->
  <g class="l2">
    <text x="46" y="130" class="mono" fill="#9ca3af">Analyzing your app...</text>
  </g>

  <!-- Line 3: checkmark Detected: Next.js application -->
  <g class="l3">
    <text x="32" y="170" class="mono" fill="#34d399" font-weight="500">&#x2713;</text>
    <text x="50" y="170" class="mono" fill="#34d399" font-weight="500">Detected: Next.js application</text>
  </g>

  <!-- Line 4: Setting up: Auth, payments, storage, hosting -->
  <g class="l4">
    <text x="46" y="210" class="mono" fill="#9ca3af">Setting up: Auth, payments, storage, hosting</text>
  </g>

  <!-- Line 5: Deploying to Varity... -->
  <g class="l5">
    <text x="46" y="250" class="mono" fill="#9ca3af">Deploying to Varity...</text>
  </g>

  <!-- Line 6: checkmark Build completed in 45s -->
  <g class="l6">
    <text x="32" y="290" class="mono" fill="#34d399" font-weight="500">&#x2713;</text>
    <text x="50" y="290" class="mono" fill="#34d399" font-weight="500">Build completed in 45s</text>
  </g>

  <!-- Line 7: checkmark Live at: https://your-app.varity.app -->
  <g class="l7">
    <text x="32" y="330" class="mono" fill="#34d399" font-weight="500">&#x2713;</text>
    <text x="50" y="330" class="mono" fill="#34d399" font-weight="500">Live at: https://your-app.varity.app</text>
  </g>

  <!-- Blinking cursor after last line -->
  <rect class="blink l7" x="50" y="350" width="9" height="18" rx="2" fill="#2dd4bf" opacity="0.8"/>

  <!-- Bottom fade overlay -->
  <rect y="380" width="800" height="40" fill="url(#fadeBottom)" rx="0"/>
</svg>
