<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <style>
    @keyframes fadeIn1  { 0%, 5%  { opacity: 0 } 6%  { opacity: 1 } }
    @keyframes fadeIn2  { 0%, 10% { opacity: 0 } 11% { opacity: 1 } }
    @keyframes fadeIn3  { 0%, 16% { opacity: 0 } 17% { opacity: 1 } }
    @keyframes fadeIn4  { 0%, 22% { opacity: 0 } 23% { opacity: 1 } }
    @keyframes fadeIn5  { 0%, 28% { opacity: 0 } 29% { opacity: 1 } }
    @keyframes fadeIn6  { 0%, 34% { opacity: 0 } 35% { opacity: 1 } }
    @keyframes fadeIn7  { 0%, 42% { opacity: 0 } 43% { opacity: 1 } }
    @keyframes fadeIn8  { 0%, 50% { opacity: 0 } 51% { opacity: 1 } }
    @keyframes fadeIn9  { 0%, 56% { opacity: 0 } 57% { opacity: 1 } }

    @keyframes progressBar {
      0%, 42% { width: 0 }
      43% { width: 0 }
      50% { width: 240px }
    }

    @keyframes blink {
      0%, 49% { opacity: 1 }
      50%, 100% { opacity: 0 }
    }

    @keyframes cursor {
      0%, 5% { opacity: 1 }
      6% { opacity: 0 }
    }

    .terminal-bg { fill: #1a1b2e; }
    .titlebar { fill: #252640; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #28c840; }
    .title-text { fill: #8b8da3; font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif; font-size: 13px; }

    text.line { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace; font-size: 14px; }

    .cmd { fill: #14B8A6; font-weight: bold; }
    .info { fill: #a5b4fc; }
    .success { fill: #34d399; }
    .progress { fill: #818cf8; }
    .final { fill: #fbbf24; font-weight: bold; }
    .savings { fill: #a78bfa; }

    .line1 { animation: fadeIn1 18s infinite; opacity: 0; }
    .line2 { animation: fadeIn2 18s infinite; opacity: 0; }
    .line3 { animation: fadeIn3 18s infinite; opacity: 0; }
    .line4 { animation: fadeIn4 18s infinite; opacity: 0; }
    .line5 { animation: fadeIn5 18s infinite; opacity: 0; }
    .line6 { animation: fadeIn6 18s infinite; opacity: 0; }
    .line7 { animation: fadeIn7 18s infinite; opacity: 0; }
    .line8 { animation: fadeIn8 18s infinite; opacity: 0; }
    .line9 { animation: fadeIn9 18s infinite; opacity: 0; }

    .cursor-blink { animation: blink 1s step-end infinite, cursor 18s infinite; }

    .progress-fill { animation: progressBar 18s infinite; }
  </style>

  <!-- Window frame -->
  <rect class="terminal-bg" x="0" y="0" width="800" height="420" rx="12" ry="12"/>

  <!-- Title bar -->
  <rect class="titlebar" x="0" y="0" width="800" height="40" rx="12" ry="12"/>
  <rect class="titlebar" x="0" y="28" width="800" height="12"/>

  <!-- macOS dots -->
  <circle class="dot-red" cx="24" cy="20" r="6"/>
  <circle class="dot-yellow" cx="44" cy="20" r="6"/>
  <circle class="dot-green" cx="64" cy="20" r="6"/>

  <!-- Title -->
  <text class="title-text" x="400" y="25" text-anchor="middle">Terminal</text>

  <!-- Cursor (before first line appears) -->
  <rect class="cursor-blink" x="32" y="62" width="9" height="17" fill="#14B8A6" rx="1"/>

  <!-- Line 1: $ varitykit deploy -->
  <text class="line line1 cmd" x="32" y="76">$ varitykit deploy</text>

  <!-- Line 2: Analyzing your app... -->
  <text class="line line2 info" x="32" y="112">Analyzing your app...</text>

  <!-- Line 3: ✓ Detected: Next.js application -->
  <text class="line line3 success" x="32" y="142">  ✓ Detected: Next.js application</text>

  <!-- Line 4: ✓ Setting up: Auth, payments, storage -->
  <text class="line line4 success" x="32" y="168">  ✓ Setting up: Auth, payments, storage</text>

  <!-- Line 5: ✓ Optimizing for production -->
  <text class="line line5 success" x="32" y="194">  ✓ Optimizing for production</text>

  <!-- Line 6: Deploying to Varity... -->
  <text class="line line6 info" x="32" y="230">Deploying to Varity...</text>

  <!-- Line 7: Progress bar -->
  <g class="line7">
    <text class="line progress" x="52" y="260">  </text>
    <!-- Progress bar background -->
    <rect x="52" y="247" width="240" height="16" rx="3" fill="#2a2b45" opacity="0.8"/>
    <!-- Progress bar fill -->
    <rect class="progress-fill" x="52" y="247" width="0" height="16" rx="3" fill="#818cf8"/>
    <text class="line progress" x="302" y="260"> 100%</text>
  </g>

  <!-- Line 8: ✅ Live at: https://my-app.varity.app -->
  <text class="line line8 final" x="32" y="300">✅ Live at: https://my-app.varity.app</text>

  <!-- Line 9: Cost savings -->
  <text class="line line9 savings" x="32" y="330">   Saving 60-80% vs AWS — auth, database, hosting included</text>
</svg>
